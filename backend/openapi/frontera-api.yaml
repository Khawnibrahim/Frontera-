            type: array
            items:
              type: string
        - name: q
          required: false
          in: query
          description: Search provider name, email, or external id
          schema:
            type: string
        - name: pendingOnly
          required: false
          in: query
          description: When true, only submissions with monthly status submitted or pending day rows
          schema:
            default: false
            type: boolean
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrnAvailabilityQueueResponseDto'
      summary: Queue view — PRN submissions grouped by provider × month with day lines
      tags:
        - Admin — PRN Availability
  /admin/prn-availability/calendar:
    get:
      operationId: AdminPrnAvailabilityController_getCalendar
      parameters:
        - name: company
          required: true
          in: query
          description: Company toggle (Frontera | 4tress)
          schema:
            example: Frontera
            type: string
        - name: monthYear
          required: false
          in: query
          description: First day of month (YYYY-MM-DD)
          schema:
            example: '2026-03-01'
            type: string
        - name: liaisonIds
          required: false
          in: query
          description: One or more liaison UUIDs (comma-separated or repeated)
          schema:
            type: array
            items:
              type: string
        - name: regions
          required: false
          in: query
          description: One or more regions (comma-separated or repeated)
          schema:
            type: array
            items:
              type: string
        - name: q
          required: false
          in: query
          description: Search provider name, email, or external id
          schema:
            type: string
      responses:
        '200':
          description: ''
      summary: Calendar view — month grid of PRN availability day rows
      tags:
        - Admin — PRN Availability
info:
  title: Frontera Scheduling API
  description: >-
    NestJS API for Frontera provider scheduling — admin onboarding, PRN availability,

    schedule change approvals, master availability, and provider portal endpoints.


    **Swagger Try it out**

    - Requests use `FRONTERA_API_PUBLIC_URL` when set, otherwise the same host that served `/api`.


    **Lovable integration**

    - Import `openapi/frontera-api.yaml` after `npm run openapi:generate` (set `FRONTERA_API_PUBLIC_URL` in `.env`
    first).

    - Admin routes: bearer auth (Supabase JWT) when guards are enabled.

    - Provider routes (`/provider/{providerId}/…`): v1 uses `providerId` path param only (no JWT).

    - HTML accept-invite (`GET/POST /accept-invite`) is excluded from this spec.


    **Errors** — JSON body: `{ statusCode, code, message }` (see `ErrorCode` in repo).
  version: 0.1.0
  contact: {}
tags:
  - name: Main
    description: Health check
  - name: Admin — Onboarding
    description: Onboard new provider, form options, work sites
  - name: Admin — Providers
    description: Active provider list and filters
  - name: Admin — Master Availability
    description: Corporate availability calendar and export
  - name: Admin — Schedule Change Approvals
    description: Pending time-off review queue
  - name: Admin — PRN Availability
    description: PRN monthly submission review queue
  - name: Provider
    description: 'Provider portal — PRN calendar, PACR upload (path: providerId)'
servers:
  - url: /
    description: Current host (same origin as this Swagger page)
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
      description: Supabase access token for admin routes
  schemas:
    WeeklySchedulePresetDto:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        shifts:
          type: array
          items:
            type: object
      required:
        - id
        - label
        - shifts
    OnboardingFormOptionsDto:
      type: object
      properties:
        recruiters:
          type: array
          items:
            type: object
        liaisons:
          type: array
          items:
            type: object
        weeklySchedulePresets:
          type: array
          items:
            $ref: '#/components/schemas/WeeklySchedulePresetDto'
        employmentTypes:
          example:
            - W2
            - '1099'
          type: array
          items:
            type: string
        scheduleTypes:
          example:
            - set
            - prn
          type: array
          items:
            type: string
        specialties:
          example:
            - Family Medicine
            - Internal Medicine
            - Hospitalist
          description: Specialty dropdown options
          type: array
          items:
            type: string
        companies:
          example:
            - Frontera
            - Optum
          description: Company dropdown options
          type: array
          items:
            type: string
        regions:
          example:
            - Region 1
            - South
            - West
          description: Region dropdown per approved work site row
          type: array
          items:
            type: string
        clinicShiftDays:
          example:
            - Monday
            - Tuesday
            - Wednesday
          description: Day dropdown when adding a clinic shift
          type: array
          items:
            type: string
      required:
        - recruiters
        - liaisons
        - weeklySchedulePresets
        - employmentTypes
        - scheduleTypes
        - specialties
        - companies
        - regions
        - clinicShiftDays
    WorkSiteSearchResultDto:
      type: object
      properties:
        id:
          type: string
        facilityName:
          type: string
        city:
          type: object
        state:
          type: object
        region:
          type: object
        clientName:
          type: string
        displayLabel:
          type: string
          description: Display label for search results
      required:
        - id
        - facilityName
        - clientName
        - displayLabel
    WeeklyShiftDto:
      type: object
      properties:
        day:
          type: string
          example: Monday
        startTime:
          type: string
          example: 8:00 AM
        endTime:
          type: string
          example: 5:00 PM
      required:
        - day
        - startTime
        - endTime
    WorkSiteAssignmentDto:
      type: object
      properties:
        workSiteId:
          type: string
          description: Work site UUID from GET /admin/onboarding/work-sites or work-sites/search
          example: c0000000-0000-4000-8000-000000000001
        facility:
          type: string
          description: >-
            Facility name from the selected search result (`facilityName` on the same row). Stored on the provider
            profile (primary site) and invite snapshot.
          example: Dallas Medical Center
        isPrimary:
          type: boolean
          description: Exactly one work site in the workSites array must be true (primary facility)
        region:
          type: string
          description: Region dropdown (form-options.regions). Omit to use the catalog site default region.
        weeklySchedule:
          description: >-
            Hours at clinic — add/delete shifts in the form before POST; falls back to defaultWeeklySchedule when
            omitted
          type: array
          items:
            $ref: '#/components/schemas/WeeklyShiftDto'
      required:
        - workSiteId
        - facility
        - isPrimary
    CreateProviderDto:
      type: object
      properties:
        firstName:
          type: string
          example: Hamza
        lastName:
          type: string
          example: Jamshed
        email:
          type: string
          example: hamzajamshed.cs@gmail.com
        phone:
          type: string
          example: (555) 555-0100
        specialty:
          type: string
          example: Family Medicine
          description: Must match a value from GET /admin/onboarding/form-options → specialties
        licenseState:
          type: string
          example: TX
          description: License state
        employmentType:
          type: string
          example: W2
          enum:
            - W2
            - '1099'
        scheduleType:
          type: string
          example: set
          enum:
            - set
            - prn
        company:
          type: string
          example: Frontera
          description: Must match a value from GET /admin/onboarding/form-options → companies
        providerIdExternal:
          type: string
          description: External provider identifier
        defaultWeeklySchedule:
          description: Default weekly pattern applied to sites without their own schedule
          type: array
          items:
            $ref: '#/components/schemas/WeeklyShiftDto'
        recruiterId:
          type: string
          description: Recruiter auth user id (Sam Recruiter from seed)
          example: a0000000-0000-4000-8000-000000000001
        liaisonId:
          type: string
          description: Liaison auth user id (Anthony Kendall from seed)
          example: a0000000-0000-4000-8000-000000000005
        workSites:
          minItems: 1
          description: >-
            Approved work sites. Add/remove rows and shifts in the UI before POST; only the final array is sent. Exactly
            one isPrimary: true.
          type: array
          items:
            $ref: '#/components/schemas/WorkSiteAssignmentDto'
        sendInvite:
          type: boolean
          default: true
          description: Send invite email after create (SES + FRONTERA_APP_URL)
      required:
        - firstName
        - lastName
        - email
        - specialty
        - licenseState
        - employmentType
        - scheduleType
        - company
        - recruiterId
        - workSites
    CreateProviderResponseDto:
      type: object
      properties:
        profileId:
          type: string
        userId:
          type: string
        inviteId:
          type: string
        inviteToken:
          type: string
          description: Present in dev for testing accept-invite; omit in production later
        inviteExpiresAt:
          type: string
        inviteSent:
          type: boolean
        inviteEmailMessageId:
          type: string
        inviteError:
          type: string
      required:
        - profileId
        - userId
        - inviteId
        - inviteToken
        - inviteExpiresAt
        - inviteSent
    ActiveProviderItemDto:
      type: object
      properties:
        userId:
          type: string
        profileId:
          type: string
        fullName:
          type: object
        email:
          type: object
        phone:
          type: object
        scheduleSummary:
          type: object
          description: Schedule line under provider name (e.g. Mon–Fri 8:00 AM – 4:00 PM)
        specialty:
          type: object
        state:
          type: object
        employmentType:
          type: object
          example: W2
        workSites:
          description: Work site facility names; empty if none
          type: array
          items:
            type: string
        recruiterName:
          type: object
        liaisonName:
          type: object
      required:
        - userId
        - profileId
        - workSites
    ActiveProvidersListResponseDto:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ActiveProviderItemDto'
        page:
          type: number
        pageSize:
          type: number
        total:
          type: number
      required:
        - items
        - page
        - pageSize
        - total
    FilterOptionPersonDto:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required:
        - id
        - name
    ActiveProvidersFilterOptionsDto:
      type: object
      properties:
        recruiters:
          type: array
          items:
            $ref: '#/components/schemas/FilterOptionPersonDto'
        liaisons:
          type: array
          items:
            $ref: '#/components/schemas/FilterOptionPersonDto'
        states:
          type: array
          items:
            type: string
        cities:
          type: array
          items:
            type: string
        regions:
          type: array
          items:
            type: string
        specialties:
          type: array
          items:
            type: string
        employmentTypes:
          type: array
          items:
            type: string
      required:
        - recruiters
        - liaisons
        - states
        - cities
        - regions
        - specialties
        - employmentTypes
    ProviderWorkSiteDto:
      type: object
      properties:
        workSiteId:
          type: string
        facilityName:
          type: string
        city:
          type: object
        state:
          type: object
        isPrimary:
          type: boolean
      required:
        - workSiteId
        - facilityName
        - isPrimary
    ProviderSchedulingContextDto:
      type: object
      properties:
        fullName:
          type: object
        email:
          type: object
        scheduleType:
          type: string
          example: prn
        recruiterName:
          type: object
        liaisonName:
          type: object
        clientName:
          type: object
          example: Optum
        workSites:
          type: array
          items:
            $ref: '#/components/schemas/ProviderWorkSiteDto'
      required:
        - scheduleType
        - workSites
    ProviderPrnMonthSubmissionDto:
      type: object
      properties:
        monthlyRequestId:
          type: string
        monthYear:
          type: string
          example: '2026-06-01'
        status:
          type: string
        deadline:
          type: string
        submittedAt:
          type: object
        noChanges:
          type: boolean
      required:
        - monthlyRequestId
        - monthYear
        - status
        - deadline
        - noChanges
    ProviderPrnAvailabilityDayDto:
      type: object
      properties:
        requestId:
          type: string
        requestDate:
          type: string
        startTime:
          type: object
        endTime:
          type: object
        notes:
          type: object
        workSiteId:
          type: object
        changeType:
          type: string
        status:
          type: string
      required:
        - requestId
        - requestDate
        - changeType
        - status
    ProviderPrnAvailabilityMonthDto:
      type: object
      properties:
        monthYear:
          type: string
        deadline:
          type: string
        isPastDeadline:
          type: boolean
        pacrRequired:
          type: boolean
        monthlyRequest:
          $ref: '#/components/schemas/ProviderPrnMonthSubmissionDto'
        days:
          type: array
          items:
            $ref: '#/components/schemas/ProviderPrnAvailabilityDayDto'
      required:
        - monthYear
        - deadline
        - isPastDeadline
        - pacrRequired
        - days
    PrnAvailabilityDayDto:
      type: object
      properties:
        requestDate:
          type: string
          example: '2026-06-15'
        startTime:
          type: string
          example: 8:00 AM
        endTime:
          type: string
          example: 5:00 PM
        notes:
          type: string
        workSiteId:
          type: string
      required:
        - requestDate
        - startTime
        - endTime
        - workSiteId
    SubmitPrnAvailabilityDto:
      type: object
      properties:
        monthYear:
          type: string
          example: '2026-06-01'
          description: First day of target month
        noChanges:
          type: boolean
          default: false
        pacrDocumentId:
          type: string
          description: Required when target month is past submission deadline
        days:
          type: array
          items:
            $ref: '#/components/schemas/PrnAvailabilityDayDto'
      required:
        - monthYear
    SubmitPrnAvailabilityResponseDto:
      type: object
      properties:
        monthlyRequestId:
          type: string
        submissionGroupId:
          type: string
        dayCount:
          type: number
        status:
          type: string
          example: submitted
      required:
        - monthlyRequestId
        - submissionGroupId
        - dayCount
        - status
    PacrUploadResponseDto:
      type: object
      properties:
        documentId:
          type: string
          description: Use as pacrDocumentId on availability submit
      required:
        - documentId
    MasterAvailabilityFilterOptionsDto:
      type: object
      properties:
        companies:
          example:
            - Frontera
            - 4tress
          type: array
          items:
            type: string
        liaisons:
          type: array
          items:
            type: object
        statuses:
          example:
            - pending_review
            - approved
            - denied
            - cancelled
          type: array
          items:
            type: string
        regions:
          example:
            - Region 1
            - South
          type: array
          items:
            type: string
      required:
        - companies
        - liaisons
        - statuses
        - regions
    MasterAvailabilityEntryDto:
      type: object
