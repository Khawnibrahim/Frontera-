            $ref: '#/components/schemas/MasterAvailabilityCalendarDayDto'
      required:
        - days
    MasterAvailabilityCalendarResponseDto:
      type: object
      properties:
        monthYear:
          type: string
          example: '2026-05-01'
        monthLabel:
          type: string
          example: May 2026
        weeks:
          type: array
          items:
            $ref: '#/components/schemas/MasterAvailabilityCalendarWeekDto'
      required:
        - monthYear
        - monthLabel
        - weeks
    ScheduleChangeFilterOptionsDto:
      type: object
      properties:
        companies:
          type: array
          items:
            type: string
        liaisons:
          type: array
          items:
            type: object
        regions:
          type: array
          items:
            type: string
