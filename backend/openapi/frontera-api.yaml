        requestId:
          type: object
          nullable: true
        providerUserId:
          type: string
        providerName:
          type: string
        liaisonName:
          type: object
          nullable: true
        date:
          type: string
          example: '2026-05-15'
        timeAvailable:
          type: object
          example: 8:00 AM – 5:00 PM
          nullable: true
        status:
          type: string
          example: approved
        specialty:
          type: object
          nullable: true
        region:
          type: object
          nullable: true
        notes:
          type: object
          nullable: true
        source:
          type: string
