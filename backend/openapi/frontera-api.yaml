                      endTime: 5:00 PM
                    - day: Tuesday
                      startTime: 8:00 AM
                      endTime: 5:00 PM
                    - day: Wednesday
                      startTime: 8:00 AM
                      endTime: 5:00 PM
                    - day: Thursday
                      startTime: 8:00 AM
                      endTime: 5:00 PM
                    - day: Friday
                      startTime: 8:00 AM
                      endTime: 5:00 PM
