        - providerName
        - date
        - status
        - source
    MasterAvailabilityListResponseDto:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MasterAvailabilityEntryDto'
        page:
          type: number
        pageSize:
          type: number
        total:
          type: number
        monthYear:
          type: string
          example: '2026-05-01'
      required:
        - items
        - page
        - pageSize
        - total
        - monthYear
    MasterAvailabilityCalendarDayDto:
