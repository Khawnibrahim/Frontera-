                  liaisonId: a0000000-0000-4000-8000-000000000005
                  workSites:
                    - workSiteId: c0000000-0000-4000-8000-000000000001
                      facility: Dallas Medical Center
                      isPrimary: true
                      region: South
                  sendInvite: true
